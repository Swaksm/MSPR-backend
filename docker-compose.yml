services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/etl/healthai_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthai"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  etl:
    build: ./services/etl
    ports:
      - "8002:8002"
    volumes:
      - ./services/etl:/app
      - ./services/etl/data:/app/data
      - ./services/etl/logs:/app/logs
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DATA_DIR=/app/data
    depends_on:
      db:
        condition: service_healthy

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    volumes:
      - ./services/gateway:/app
    environment:
      - ENV=development
      - KCAL_SERVICE_URL=http://kcal:8001
      - MEAL_SERVICE_URL=http://meal:8003
      - AUTH_SERVICE_URL=http://auth:8004
      - ADMIN_SERVICE_URL=http://admin:8006
    depends_on:
      - kcal
      - meal
      - auth
      - admin

  admin:
    build: ./services/admin
    ports:
      - "8006:8006"
    volumes:
      - ./services/admin:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db


  kcal:
    build: ./services/kcal
    ports:
      - "8001:8001"
    volumes:
      - ./services/kcal:/app
    environment:
      - ENV=development
    depends_on:
      - db

  meal:
    build: ./services/meal
    ports:
      - "8003:8003"
    volumes:
      - ./services/meal:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db

  auth:
    build: ./services/auth
    ports:
      - "8004:8004"
    volumes:
      - ./services/auth:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthai
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db

volumes:
  postgres_data:
